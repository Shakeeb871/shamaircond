# Render Blueprint — one-click deploy of the site + PostgreSQL database.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: stemcell-site
    runtime: python
    plan: starter
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi --workers 3"
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false        # set to your domain(s), e.g. yourbrand.com,www.yourbrand.com
      - key: SITE_DOMAIN
        sync: false        # e.g. yourbrand.com
      - key: BRAND_NAME
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: stemcell-db
          property: connectionString
      # Stripe (paste your live/test keys in the Render dashboard)
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

databases:
  - name: stemcell-db
    plan: basic-256mb
