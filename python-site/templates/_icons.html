{% macro icon(name) %}
{% if name == 'fridge' %}
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M5 10h14"/><path d="M8 5v2"/><path d="M8 13v3"/></svg>
{% elif name == 'washer' %}
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><circle cx="12" cy="14" r="5"/><circle cx="12" cy="14" r="1.6"/><path d="M7 5.5h.01"/><path d="M10 5.5h.01"/></svg>
{% elif name == 'aircon' %}
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="9" rx="2"/><path d="M5 9h14"/><path d="M6 16c0 1.5 1 2 2 2"/><path d="M12 16v3"/><path d="M18 16c0 1.5-1 2-2 2"/></svg>
{% elif name == 'oven' %}
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M7 6h.01"/><path d="M11 6h.01"/><rect x="6" y="12" width="12" height="6" rx="1"/></svg>
{% elif name == 'heater' %}
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="2" width="12" height="14" rx="6"/><path d="M12 16v6"/><path d="M9 19h6"/><path d="M12 6v4"/></svg>
{% elif name == 'dishwasher' %}
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M4 7h16"/><path d="M7 4.5h.01"/><path d="M10 4.5h.01"/><path d="M9 11c1 1 2 1 3 0s2-1 3 0"/><path d="M9 15c1 1 2 1 3 0s2-1 3 0"/></svg>
{% else %}
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 7l-1.5-1.5a3.5 3.5 0 00-5 5L4 14l-1 4 4-1 3.5-3.5a3.5 3.5 0 005-5z"/></svg>
{% endif %}
{% endmacro %}

{% macro check() %}
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
{% endmacro %}
