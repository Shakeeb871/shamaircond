{% load region_tags %}
<header class="site-header">
  <div class="container site-header__inner">
    <a class="brand" href="{% rurl 'core:home' %}" aria-label="{{ BRAND_NAME }} home">
      <span class="brand__mark" aria-hidden="true">🧬</span>
      <span class="brand__name">{{ BRAND_NAME }}</span>
    </a>

    <button class="nav-toggle" data-nav-toggle aria-controls="site-nav" aria-expanded="false">
      <span class="nav-toggle__bar"></span>
      <span class="sr-only">Menu</span>
    </button>

    <nav id="site-nav" class="site-nav" aria-label="Primary">
      <a href="{% rurl 'core:home' %}">Home</a>
      <a href="{% rurl 'services:list' %}">Services</a>
      <a href="{% rurl 'events:list' %}">Events</a>
      <a href="{% rurl 'core:about' %}">About</a>
      <a href="{% rurl 'core:contact' %}">Contact</a>

      {% if enabled_regions|length > 1 %}
      <div class="region-switch" aria-label="Choose region">
        {% for r in enabled_regions %}
        <a href="{% region_home r.code %}" class="{% if r.code == region_code %}is-active{% endif %}">{{ r.short }}</a>
        {% endfor %}
      </div>
      {% endif %}

      <a class="btn btn--primary nav-cta" href="{% rurl 'core:contact' %}">Book Consultation</a>
    </nav>
  </div>
</header>
